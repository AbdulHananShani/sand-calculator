<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square — teal gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Grid icon — 4 squares like calculator -->
  <rect x="6"  y="6"  width="8" height="8" rx="1.5" fill="white"/>
  <rect x="18" y="6"  width="8" height="8" rx="1.5" fill="white"/>
  <rect x="6"  y="18" width="8" height="8" rx="1.5" fill="white"/>
  <rect x="18" y="18" width="8" height="8" rx="1.5" fill="white" opacity="0.6"/>
</svg>